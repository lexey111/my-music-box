appId: com.musicbox.app
productName: My Music Box
directories:
  buildResources: build
  output: dist
files:
  - out/**/*
  - '!src/**'
  - '!electron.vite.config.*'
  - '!svelte.config.*'
  - '!tsconfig*'
extraResources:
  - from: resources/icon.png
    to: icon.png
  - from: resources/bin
    to: bin
    filter:
      - ffmpeg
      - ffprobe
asarUnpack:
  # Native modules must not be asar-packed
  - node_modules/better-sqlite3/**
mac:
  category: public.app-category.music
  target:
    - dmg
    - zip
  notarize: false
npmRebuild: true
